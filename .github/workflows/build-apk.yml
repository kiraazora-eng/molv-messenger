name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install Capacitor
        run: npm install -g @capacitor/cli @capacitor/core
        
      - name: Create Capacitor project
        run: |
          mkdir -p static
          npx cap init МОЛВЪ com.molv.messenger --web-dir=static
          
      - name: Add Android platform
        run: npx cap add android
        
      - name: Configure Android permissions
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          if ! grep -q "INTERNET" "$MANIFEST_PATH"; then
            sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET" \/><application/' "$MANIFEST_PATH"
          fi
          
          if ! grep -q "ACCESS_NETWORK_STATE" "$MANIFEST_PATH"; then
            sed -i 's/<application/<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/><application/' "$MANIFEST_PATH"
          fi
          
      - name: Sync web assets
        run: npx cap sync android
        
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: МОЛВЪ-мессенджер
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          
      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: МОЛВЪ v1.0.0
          body: |
            ## МОЛВЪ мессенджер
            
            ### Что нового:
            - Первая версия мессенджера
            - Поддержка Android
            - Обмен сообщениями в реальном времени
            - Добавление друзей
            
            ### Установка:
            1. Скачайте APK файл ниже
            2. Разрешите установку из неизвестных источников
            3. Установите приложение
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
