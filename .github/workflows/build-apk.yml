name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "molv-messenger",
            "version": "1.0.0",
            "description": "МОЛВЪ мессенджер",
            "main": "index.js",
            "scripts": {
              "build": "echo 'Build complete'"
            },
            "dependencies": {
              "@capacitor/android": "^5.0.0",
              "@capacitor/core": "^5.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^5.0.0"
            },
            "author": "МОЛВЪ",
            "license": "MIT"
          }
          EOF
          
      - name: Install Capacitor
        run: |
          npm install
          npm install -g @capacitor/cli @capacitor/core
          
      - name: Create Capacitor project
        run: |
          mkdir -p static
          npx cap init МОЛВЪ com.molv.messenger --web-dir=static
          
      - name: Add Android platform
        run: npx cap add android
        
      - name: Configure Android permissions
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          if ! grep -q "INTERNET" "$MANIFEST_PATH"; then
            sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET" \/><application/' "$MANIFEST_PATH"
          fi
          
          if ! grep -q "ACCESS_NETWORK_STATE" "$MANIFEST_PATH"; then
            sed -i 's/<application/<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/><application/' "$MANIFEST_PATH"
          fi
          
      - name: Sync web assets
        run: npx cap sync android
        
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: МОЛВЪ-мессенджер
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
